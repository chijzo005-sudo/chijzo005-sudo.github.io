<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>for my agum 💗</title>

<style>
@import url("https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap");

* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family:"Poppins",sans-serif;
  background:linear-gradient(135deg,#f5e0ee,#d5aecb);
}

/* CENTER */
.center {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

/* PAGE 1 */
.box {
  background:white;
  padding:2.5rem;
  border-radius:15px;
  text-align:center;
  box-shadow:0 5px 15px rgba(0,0,0,0.15);
  width:90%;
  max-width:350px;
}

/* GIF */
img {
  width:160px;
  border-radius:12px;
  transition:transform 0.3s ease;
}

/* bounce */
@keyframes bounce {
  0% { transform: scale(1); }
  30% { transform: scale(1.15); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}

.bounce {
  animation: bounce 0.4s;
}

.title {
  font-size:1.8rem;
  color:hotpink;
  margin:1rem 0;
}

button {
  padding:0.9rem 1.5rem;
  margin:0.4rem;
  border:none;
  border-radius:18px;
  cursor:pointer;
  transition:0.2s;
  font-size:1rem;
}

.yes { background:green; color:white; }
.no { background:crimson; color:white; }

/* LETTER */
.letter {
  max-width:600px;
  background:white;
  padding:1.5rem;
  border-radius:12px;
  box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

/* VIDEO */
iframe {
  width:100%;
  height:220px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* blinking cursor */
#letterText::after {
  content:"|";
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { opacity:0; }
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="center">
  <div class="box">

    <img id="mainGif" src="https://media.tenor.com/TUVAE2M_wz4AAAAi/chubby-tonton.gif">

    <p class="title">hi theaa, would yoy like to open this?</p>

    <button class="yes" onclick="goLetter()">Yes</button>
    <button class="no" id="noBtn">No</button>

  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="center" style="display:none;">
  <div class="letter">

    <!-- 🎥 VIDEO -->
    <iframe
      src="https://drive.google.com/file/d/1rv9Vcy7_mO2iamia1BtghLgoa-wD2orH/preview"
      allow="autoplay">
    </iframe>

    <h1 style="font-family:cursive;">for my gorgeous agum,</h1>

    <!-- ✍️ TYPING LETTER -->
    <p id="letterText" style="text-align:left; line-height:1.6;"></p>

  </div>
</div>

<script>

/* NAV */
function goLetter(){
  document.getElementById("page1").style.display="none";
  document.getElementById("page2").style.display="flex";

  setTimeout(typeLetter, 500);
}

/* 💗 TYPING ANIMATION (LETTER ONLY) */
const fullText = `
halleerr my beautiful thea.

this is for you. i made this with love.

I dedicate this song just for u.
 
I hope you know how much you mean to me.
  
Thank you for being there when i have nobody,
  
thank you for being my strength.
  
I promise you na i wont hurt you and ill choose u forever without any pause.

God knows how much im thankful that i met you, he knows because i always whisper your name to him.

  thank you althea alarcio cariño na muse ng mapeh na dating aguinaldo, mahal kita at palagi kitang mamahalin.
`

let i = 0;

function typeLetter() {
  const el = document.getElementById("letterText");

  if (i < fullText.length) {
    el.innerHTML += fullText.charAt(i);
    i++;
    setTimeout(typeLetter, 25);
  }
}

/* 💔 NO BUTTON + GIF + BOUNCE */
const noBtn = document.getElementById("noBtn");
const mainGif = document.getElementById("mainGif");

const gifs = [
  "https://media.tenor.com/TUVAE2M_wz4AAAAi/chubby-tonton.gif",
  "https://media.tenor.com/pZk_U5JVWzUAAAAi/tonton-friends-tonton.gif",
  "https://media.tenor.com/Jkha__Yjf0oAAAAi/sad-depression.gif",
  "https://media.tenor.com/U0OPHZokzkUAAAAi/what-seriously.gif",
  "https://media.tenor.com/WKXMmSk3JJsAAAAi/chubby-tonton.gif"
];

let count = 0;

noBtn.addEventListener("click", () => {
  count++;

  mainGif.src = gifs[Math.min(count, gifs.length - 1)];

  // bounce effect
  mainGif.classList.remove("bounce");
  void mainGif.offsetWidth;
  mainGif.classList.add("bounce");

  const messages = [
    "No",
    "are you shore?",
    "open na plsplspls",
    "pls agummmmm",
    "open naaa, iiyak ako sige"
  ];

  noBtn.innerText = messages[Math.min(count, messages.length - 1)];

  const yesBtn = document.querySelector(".yes");
  yesBtn.style.transform = `scale(${1 + count * 0.12})`;
  noBtn.style.transform = `scale(${1 - count * 0.07})`;

  if(count >= gifs.length - 1){
    noBtn.disabled = true;
  }
});

</script>

</body>
</html>
